name: Update Feed

on:
  schedule:
    - cron: '0 * * * *'   # 毎時実行（新着のみ・quickモード）
    - cron: '0 15 * * *'  # 毎日0時JST（フル実行・UTC15時=JST0時）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip -q
          pip install requests beautifulsoup4 feedparser lxml python-dotenv google-api-python-client anthropic -q

      - name: Run scraper
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 * * * *" ]; then
            python3 scraper.py --quick
          else
            python3 scraper.py --full
          fi

      - name: Write timestamp (JST)
        run: TZ=Asia/Tokyo date +'%m.%d %H:%M' > last_updated.txt

      - name: Commit and push
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # CSVは変更があればステージ（新規記事ゼロでもエラーにしない）
          git add life_curated_feed.csv 2>/dev/null || true
          # last_updated.txtは毎回内容が変わるため常にコミット対象
          git add last_updated.txt
          git commit -m "chore: update feed $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push --force-with-lease
