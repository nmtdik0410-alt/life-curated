name: Update Feed

on:
  schedule:
    # 毎日 UTC 0:00 = 日本時間 9:00 に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # GitHub の Actions タブから手動実行も可能

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip -q
          pip install requests beautifulsoup4 feedparser lxml python-dotenv google-api-python-client anthropic -q

      - name: Run scraper
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python scraper.py

      - name: Write timestamp (JST)
        run: TZ=Asia/Tokyo date +'%m.%d %H:%M' > last_updated.txt

      - name: Commit and push
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # CSVは変更があればステージ（新規記事ゼロでもエラーにしない）
          git add life_curated_feed.csv 2>/dev/null || true
          # last_updated.txtは毎回内容が変わるため常にコミット対象
          git add last_updated.txt
          git commit -m "chore: update feed $(TZ=Asia/Tokyo date +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push --force-with-lease
