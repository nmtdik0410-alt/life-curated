name: Update Feed

on:
  schedule:
    # 毎日 UTC 0:00 = 日本時間 9:00 に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # GitHub の Actions タブから手動実行も可能

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip -q
          pip install requests beautifulsoup4 feedparser lxml python-dotenv google-api-python-client -q

      - name: Run scraper
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scraper.py

      - name: Write timestamp (JST)
        run: TZ=Asia/Tokyo date +'%m.%d %H:%M' > last_updated.txt

      - name: Commit and push if CSV changed
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add life_curated_feed.csv last_updated.txt life_curated_errors.txt || true
          if git diff --staged --quiet; then
            echo "変更なし — コミットをスキップします"
          else
            git commit -m "chore: update feed $(date -u +'%Y-%m-%d')"
            git push
          fi
