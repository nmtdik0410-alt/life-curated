<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFE CURATED</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #fafafa;
  --surface:   #ffffff;
  --line:      #e8e8e8;
  --line-soft: #f0f0f0;
  --ink:       #18181b;
  --ink-soft:  #71717a;
  --ink-faint: #a1a1aa;

  /* category accents - 彩度を抑えたモノトーン寄り */
  --c-interior:     #52525b;
  --c-architecture: #71717a;
  --c-cafe:         #8b6f4e;
  --c-event:        #8b5a6b;
  --c-gadget:       #4a6b8a;
  --c-culture:      #6b5b8a;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.6;
}

/* ============ TOP BAR ============ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(250,250,250,.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.topbar-inner {
  max-width: 1100px; margin: 0 auto;
  padding: 18px 28px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 20px;
}
.logo {
  font-size: 15px; font-weight: 700; letter-spacing: -.01em;
}
.logo .accent { color: var(--ink-faint); font-weight: 400; }

.topbar-meta {
  display: flex; align-items: center; gap: 14px;
  font-size: 12px; color: var(--ink-soft);
}
.live { display: inline-flex; align-items: center; gap: 6px; }
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #52525b;
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ============ CATEGORY NAV ============ */
.catnav {
  max-width: 1100px; margin: 0 auto;
  padding: 14px 28px;
  display: flex; gap: 6px; flex-wrap: wrap;
  border-bottom: 1px solid var(--line);
}
.catnav button {
  font-family: 'Inter', sans-serif;
  font-size: 12.5px; font-weight: 500; letter-spacing: 0;
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.catnav button .sw {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.catnav button:hover { background: var(--line-soft); color: var(--ink); }
.catnav button.active {
  background: var(--ink); color: #fff;
}
.catnav button.active .sw { background: #fff !important; }

/* ============ FEED SECTIONS ============ */
.feed { max-width: 1100px; margin: 0 auto; padding: 8px 28px 80px; }

.cat-section { margin-top: 36px; }
.cat-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 14px;
}
.cat-head .left { display: flex; align-items: center; gap: 10px; }
.cat-head .sw {
  width: 8px; height: 8px; border-radius: 50%;
}
.cat-head h2 {
  font-size: 15px; font-weight: 600; letter-spacing: -.01em;
}
.cat-head .count {
  font-size: 12px; color: var(--ink-faint);
  font-family: 'JetBrains Mono', monospace;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
@media (max-width: 860px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
  .cards { grid-template-columns: 1fr; }
}

.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  display: flex; flex-direction: column;
  text-decoration: none; color: var(--ink);
  transition: border-color .15s, box-shadow .15s;
}
.card:hover {
  border-color: var(--ink-faint);
  box-shadow: 0 2px 12px rgba(0,0,0,.04);
}
.card-thumb {
  width: 100%; aspect-ratio: 16/10;
  background: var(--line-soft);
  overflow: hidden;
}
.card-thumb img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}
.card-body {
  padding: 14px 16px 16px;
  display: flex; flex-direction: column; flex-grow: 1;
  gap: 8px;
}
.card .meta-row {
  display: flex; align-items: center; gap: 8px;
}
.card .cat-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.card .src {
  font-size: 11px; font-weight: 500;
  color: var(--ink-faint);
}
.card .title {
  font-size: 13.5px; font-weight: 500; line-height: 1.55;
  letter-spacing: -.005em;
  flex-grow: 1;
}
.card .excerpt {
  font-size: 12px; line-height: 1.7; color: var(--ink-soft);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ============ FOOTER ============ */
footer {
  border-top: 1px solid var(--line);
  padding: 28px 28px;
  max-width: 1100px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
  font-size: 11.5px; color: var(--ink-faint);
}

/* ============ EMPTY ============ */
.empty {
  grid-column: 1 / -1;
  padding: 32px 16px; text-align: center;
  color: var(--ink-faint); font-size: 12.5px;
  background: var(--surface);
  border: 1px solid var(--line); border-radius: 10px;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">LIFE CURATED<span class="accent"> / lifestyle feed</span></div>
    <div class="topbar-meta">
      <span class="live"><span class="live-dot"></span><span id="updated-date">Loading…</span></span>
      <span id="total-count">—</span>
    </div>
  </div>
</div>

<div class="catnav" id="catnav">
  <button class="active" data-cat="all"><span class="sw" style="background:var(--ink)"></span>すべて</button>
  <button data-cat="interior"><span class="sw" style="background:var(--c-interior)"></span>インテリア</button>
  <button data-cat="architecture"><span class="sw" style="background:var(--c-architecture)"></span>建築</button>
  <button data-cat="cafe"><span class="sw" style="background:var(--c-cafe)"></span>カフェ・スポット</button>
  <button data-cat="event"><span class="sw" style="background:var(--c-event)"></span>イベント</button>
  <button data-cat="gadget"><span class="sw" style="background:var(--c-gadget)"></span>ガジェット・プロダクト</button>
  <button data-cat="culture"><span class="sw" style="background:var(--c-culture)"></span>カルチャー・アート</button>
</div>

<div class="feed" id="feed">
  <div style="padding:64px 0;text-align:center;color:var(--ink-faint);font-size:13px;">記事を読み込んでいます…</div>
</div>

<footer>
  <div>LIFE CURATED</div>
  <div>v2.0 — Automatic Feed</div>
</footer>

<script>
// ============ カテゴリ定義 ============
const CATS = {
  interior:     { label: 'インテリア',           accent: 'var(--c-interior)' },
  architecture: { label: '建築',                 accent: 'var(--c-architecture)' },
  cafe:         { label: 'カフェ・スポット',     accent: 'var(--c-cafe)' },
  event:        { label: 'イベント',             accent: 'var(--c-event)' },
  gadget:       { label: 'ガジェット・プロダクト', accent: 'var(--c-gadget)' },
  culture:      { label: 'カルチャー・アート',   accent: 'var(--c-culture)' },
};

const CATEGORY_LABEL_TO_KEY = {
  'インテリア': 'interior', '建築': 'architecture', 'カフェ・スポット': 'cafe',
  'イベント': 'event', 'ガジェット・プロダクト': 'gadget', 'カルチャー・アート': 'culture'
};

// キーワードベースの再分類ルール
const KEYWORD_RULES = [
  { cat: 'event',        keywords: ['展', 'フェア', 'デザインウィーク', 'サローネ', 'まとめ！', 'イベント', 'ライブ', '開催', 'セール', 'キャンペーン', '週末'] },
  { cat: 'culture',      keywords: ['美術', 'アート', 'ギャラリー', '作家', 'アーティスト', '個展', '美術館', '映画', '音楽', 'カルチャー', '書籍', '出版', '写真集'] },
  { cat: 'architecture', keywords: ['建築', '建物', '邸宅', '住宅', 'house', 'リノベーション', 'リフォーム', '設計', '建築家', 'パビリオン'] },
  { cat: 'cafe',         keywords: ['カフェ', 'コーヒー', 'レストラン', 'ホテル', 'ショップ', '店', 'スポット', '訪れたい', 'グルメ', 'フード', 'メニュー'] },
  { cat: 'gadget',       keywords: ['ガジェット', '掃除機', '家電', 'プロダクト', 'デバイス', 'スマート', 'アプリ', 'テック', 'AI'] },
  { cat: 'interior',     keywords: ['インテリア', '家具', '雑貨', 'チェア', 'ソファ', 'テーブル', '照明', 'ルームツアー', '部屋', '収納', 'デザイン'] },
];

function reclassify(title, excerpt, fallbackCat) {
  const text = `${title} ${excerpt}`;
  for (const rule of KEYWORD_RULES) {
    if (rule.keywords.some(kw => text.includes(kw))) return rule.cat;
  }
  return fallbackCat;
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function splitRow(line) {
  const cells = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i + 1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { cells.push(cur); cur = ''; }
    else { cur += ch; }
  }
  cells.push(cur); return cells;
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = splitRow(lines[0]).map(h => h.replace(/^﻿/, '').trim());
  return lines.slice(1).map(line => {
    const cells = splitRow(line); const obj = {};
    headers.forEach((h, i) => { obj[h] = (cells[i] || '').trim(); }); return obj;
  }).filter(r => r.title || r.url);
}

let allData = []; let currentFilter = 'all';

function render() {
  const feed = document.getElementById('feed'); feed.innerHTML = '';
  const keys = currentFilter === 'all' ? Object.keys(CATS) : [currentFilter];

  keys.forEach(key => {
    const cfg = CATS[key]; const items = allData.filter(d => d.category === key);
    if (currentFilter === 'all' && items.length === 0) return;

    const section = document.createElement('div');
    section.className = 'cat-section';
    section.innerHTML = `<div class="cat-head"><div class="left"><span class="sw" style="background:${cfg.accent}"></span><h2>${cfg.label}</h2></div><span class="count">${items.length}</span></div><div class="cards" id="c-${key}"></div>`;
    feed.appendChild(section);

    const grid = document.getElementById(`c-${key}`);
    items.forEach(item => {
      const a = document.createElement('a'); a.className = 'card'; a.href = item.url || '#'; a.target = '_blank'; a.rel = 'noopener noreferrer';
      const thumbHtml = item.thumbnail ? `<div class="card-thumb"><img src="${esc(item.thumbnail)}" alt="" loading="lazy" onerror="this.parentElement.remove()"></div>` : '';
      
      a.innerHTML = `
        ${thumbHtml}
        <div class="card-body">
          <div class="meta-row">
            <span class="cat-dot" style="background:${cfg.accent}"></span>
            <span class="src">${esc(item.source)}</span>
          </div>
          <div class="title">${esc(item.title)}</div>
          <div class="excerpt">${esc(item.excerpt)}</div>
        </div>
      `;
      grid.appendChild(a);
    });
  });

  if (feed.children.length === 0) {
    feed.innerHTML = `<div class="empty">記事がありません</div>`;
  }
  document.getElementById('total-count').textContent = `${allData.length} articles`;
}

document.querySelectorAll('#catnav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#catnav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); currentFilter = btn.dataset.cat; render();
  });
});

async function loadCSV() {
  try {
    const res = await fetch('life_curated_feed.csv');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text(); const rows = parseCSV(text);
    if (rows.length === 0) throw new Error('no data');
    
    allData = rows.map(r => {
      const catLabel = r.category || r['カテゴリ'] || '';
      const fallbackCat = CATEGORY_LABEL_TO_KEY[catLabel] || 'interior';
      const title = r.title || r['タイトル'] || '';
      const excerpt = r.excerpt || r['概要'] || '';
      const catKey = reclassify(title, excerpt, fallbackCat);
      const rawDate = r.date || r['日付'] || '';
      return {
        source: r.source || r['メディア名'] || '',
        title,
        url: r.url || r['URL'] || '#',
        date: rawDate.length >= 10 ? rawDate.slice(5, 10).replace('-', '.') : rawDate,
        excerpt,
        category: catKey,
        thumbnail: r.thumbnail || r['サムネイル'] || '',
      };
    }).filter(d => d.title);

    const latestDate = rows.map(r => r.date || r['日付']).filter(Boolean).sort().reverse()[0];
    if (latestDate && latestDate.length >= 10) {
      document.getElementById('updated-date').textContent = `Updated ${latestDate.slice(5,10).replace('-', '.')}`;
    } else {
      document.getElementById('updated-date').textContent = 'Updated';
    }
    render();
  } catch (err) {
    console.warn('[LIFE CURATED] CSV読み込みエラー:', err.message);
    document.getElementById('updated-date').textContent = 'CSV未読込';
    document.getElementById('feed').innerHTML = `<div class="empty">データの自動読み込みに失敗しました。</div>`;
  }
}
loadCSV();
</script>
</body>
</html>
