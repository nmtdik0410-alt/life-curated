<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFE CURATED</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f7f4ee;
  --surface:   #ffffff;
  --line:      #e6e0d4;
  --ink:       #2b2620;
  --ink-soft:  #8c8174;
  --ink-faint: #c2b9aa;
  --c-interior:     #6b7c5e;
  --c-architecture: #5a6474;
  --c-cafe:         #c4774a;
  --c-event:        #7c6b4a;
  --c-gadget:       #4a6b8a;
  --c-culture:      #9c5a6e;
  --interior-tint:     #eef1ea;
  --architecture-tint: #eaeced;
  --cafe-tint:         #faeee4;
  --event-tint:        #f2ede4;
  --gadget-tint:       #eaeff4;
  --culture-tint:      #f5eaed;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(247,244,238,.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
}
.topbar-inner {
  max-width: 1180px; margin: 0 auto;
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 600; letter-spacing: .06em;
  white-space: nowrap;
}
.logo .dot { color: var(--c-cafe); }
.topbar-meta {
  display: flex; align-items: center; gap: 18px;
  font-size: 11px; color: var(--ink-soft); letter-spacing: .04em;
}
.live { display: inline-flex; align-items: center; gap: 6px; }
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--c-interior);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.hero {
  max-width: 1180px; margin: 0 auto;
  padding: 60px 28px 40px;
  display: grid; grid-template-columns: 1.3fr 1fr; gap: 48px; align-items: end;
  border-bottom: 1px solid var(--line);
}
@media(max-width:860px){ .hero{grid-template-columns:1fr;gap:24px;padding:40px 24px 28px} }
.hero-eyebrow {
  font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
  color: var(--c-cafe); font-weight: 600; margin-bottom: 18px;
}
.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; font-size: clamp(38px, 6.5vw, 72px);
  line-height: 1.06; letter-spacing: .01em;
}
.hero h1 em { font-style: italic; font-weight: 500; color: var(--c-interior); }
.hero-right { display: flex; flex-direction: column; gap: 14px; }
.hero-desc {
  font-size: 13.5px; line-height: 1.95; color: var(--ink-soft); max-width: 460px;
}
.hero-stats { display: flex; gap: 0; border-top: 1px solid var(--line); }
.hero-stat { flex: 1; padding: 14px 0; border-right: 1px solid var(--line); }
.hero-stat:last-child { border-right: none; }
.hero-stat .n {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 600; line-height: 1;
}
.hero-stat .l {
  font-size: 10px; color: var(--ink-soft);
  letter-spacing: .1em; text-transform: uppercase; margin-top: 5px;
}
.catnav {
  max-width: 1180px; margin: 0 auto;
  padding: 20px 28px; display: flex; gap: 8px; flex-wrap: wrap;
}
.catnav button {
  font-family: 'Jost', sans-serif;
  font-size: 12px; font-weight: 500; letter-spacing: .04em;
  padding: 7px 16px; border-radius: 100px;
  border: 1px solid var(--line); background: var(--surface); color: var(--ink-soft);
  cursor: pointer; transition: all .18s;
  display: flex; align-items: center; gap: 7px;
}
.catnav button .sw { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.catnav button:hover { border-color: var(--ink-faint); color: var(--ink); }
.catnav button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.catnav button.active .sw { background: rgba(255,255,255,.7) !important; }
.feed { max-width: 1180px; margin: 0 auto; padding: 0 28px 80px; }
.cat-section { margin-bottom: 52px; }
.cat-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 16px; margin-bottom: 16px;
  padding-bottom: 11px; border-bottom: 2px solid var(--ink);
}
.cat-head .left { display: flex; align-items: baseline; gap: 14px; }
.cat-head h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 500; letter-spacing: .02em;
}
.cat-head .en {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  letter-spacing: .12em; text-transform: uppercase;
}
.cat-head .count { font-size: 11px; color: var(--ink-soft); }
.cards {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 1px; background: var(--line); border: 1px solid var(--line);
}
@media(max-width:860px){ .cards{grid-template-columns:repeat(2,1fr)} }
@media(max-width:540px){ .cards{grid-template-columns:1fr} }
.card {
  background: var(--surface);
  display: flex; flex-direction: column;
  text-decoration: none; color: var(--ink);
  transition: background .15s;
  position: relative; overflow: hidden;
}
.card:hover { background: var(--tint, var(--bg)); }
.card-thumb {
  width: 100%; height: 160px;
  object-fit: cover; display: block;
  background: var(--line);
  flex-shrink: 0;
}
.card-body { padding: 20px 20px 18px; display: flex; flex-direction: column; flex: 1; }
.card .src-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.card .src {
  font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--accent, var(--ink-soft));
}
.card .date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; color: var(--ink-faint);
}
.card .title {
  font-size: 14px; font-weight: 500; line-height: 1.65;
  margin-bottom: 9px; flex-grow: 1;
}
.card .excerpt {
  font-size: 12px; line-height: 1.8; color: var(--ink-soft);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card .arrow {
  margin-top: 14px; font-size: 10.5px; letter-spacing: .09em;
  color: var(--accent, var(--ink-soft));
  display: flex; align-items: center; gap: 5px;
  opacity: 0; transform: translateX(-4px); transition: all .18s;
}
.card:hover .arrow { opacity: 1; transform: translateX(0); }
.card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent, transparent);
  transform: scaleY(0); transform-origin: top; transition: transform .18s;
}
.card:hover::before { transform: scaleY(1); }
footer {
  border-top: 1px solid var(--line);
  padding: 32px 28px;
  max-width: 1180px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
  font-size: 11px; color: var(--ink-faint); letter-spacing: .04em;
}
footer .fmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 600; color: var(--ink-soft);
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">LIFE<span class="dot"> ・</span>CURATED</div>
    <div class="topbar-meta">
      <span class="live"><span class="live-dot"></span><span id="updated-date">Loading…</span></span>
      <span id="total-count">—</span>
    </div>
  </div>
</div>
<div class="hero">
  <div>
    <div class="hero-eyebrow">Lifestyle News, Curated</div>
    <h1>感度の高い<br><em>暮らし</em>のニュースを、<br>ひとつの場所で。</h1>
  </div>
  <div class="hero-right">
    <p class="hero-desc">
      Casa BRUTUS、Hanako、WIRED Japan、美術手帖など12のメディアから、
      最新記事を毎朝9時に自動集約。気になる記事は元のメディアへ。
    </p>
    <div class="hero-stats">
      <div class="hero-stat"><div class="n" id="stat-articles">—</div><div class="l">Articles</div></div>
      <div class="hero-stat"><div class="n">12</div><div class="l">Sources</div></div>
      <div class="hero-stat"><div class="n">6</div><div class="l">Categories</div></div>
    </div>
  </div>
</div>
<div class="catnav" id="catnav">
  <button class="active" data-cat="all"><span class="sw" style="background:var(--ink)"></span>すべて</button>
  <button data-cat="interior"><span class="sw" style="background:var(--c-interior)"></span>インテリア</button>
  <button data-cat="architecture"><span class="sw" style="background:var(--c-architecture)"></span>建築</button>
  <button data-cat="cafe"><span class="sw" style="background:var(--c-cafe)"></span>カフェ・スポット</button>
  <button data-cat="event"><span class="sw" style="background:var(--c-event)"></span>イベント</button>
  <button data-cat="gadget"><span class="sw" style="background:var(--c-gadget)"></span>ガジェット・プロダクト</button>
  <button data-cat="culture"><span class="sw" style="background:var(--c-culture)"></span>カルチャー・アート</button>
</div>
<div class="feed" id="feed">
  <div style="padding:64px 0;text-align:center;color:var(--ink-faint);font-size:13px;">記事を読み込んでいます…</div>
</div>
<footer>
  <div class="fmark">LIFE CURATED</div>
  <div>Powered by GitHub Actions — 毎朝 9:00 JST 自動更新</div>
</footer>
<script>
const CATS = {
  interior: { label: 'インテリア', en: 'INTERIOR & DESIGN', accent: 'var(--c-interior)', tint: 'var(--interior-tint)', sources: ['Casa BRUTUS Web', 'Elle Decor Japan'] },
  architecture: { label: '建築', en: 'ARCHITECTURE', accent: 'var(--c-architecture)', tint: 'var(--architecture-tint)', sources: ['AXIS Web'] },
  cafe: { label: 'カフェ・スポット', en: 'CAFE & SPOTS', accent: 'var(--c-cafe)', tint: 'var(--cafe-tint)', sources: ['Hanako Web', '&Premium Web'] },
  event: { label: 'イベント', en: 'EVENTS', accent: 'var(--c-event)', tint: 'var(--event-tint)', sources: ['POPEYE Web', 'Time Out Tokyo'] },
  gadget: { label: 'ガジェット・プロダクト', en: 'GADGET & PRODUCT', accent: 'var(--c-gadget)', tint: 'var(--gadget-tint)', sources: ['Pen Online', 'WIRED Japan', 'ギズモード・ジャパン'] },
  culture: { label: 'カルチャー・アート', en: 'CULTURE & ART', accent: 'var(--c-culture)', tint: 'var(--culture-tint)', sources: ['BRUTUS.jp', '美術手帖'] }
};
const CAT_MAP = { 'インテリア': 'interior', '建築': 'architecture', 'カフェ・スポット': 'cafe', 'イベント': 'event', 'ガジェット・プロダクト': 'gadget', 'カルチャー・アート': 'culture' };
function detectCategory(catStr, sourceStr) {
  if (catStr && CAT_MAP[catStr]) return CAT_MAP[catStr];
  for (const [key, cfg] of Object.entries(CATS)) {
    if (cfg.sources.some(s => (sourceStr || '').includes(s) || s.includes(sourceStr || ''))) return key;
  }
  return 'interior';
}
function formatDate(str) {
  if (!str) return '';
  const m = str.match(/\d{4}-(\d{2})-(\d{2})/);
  return m ? `${m[1]}.${m[2]}` : str.slice(0, 10);
}
function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function splitRow(line) {
  const cells = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i + 1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { cells.push(cur); cur = ''; }
    else { cur += ch; }
  }
  cells.push(cur); return cells;
}
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = splitRow(lines[0]).map(h => h.replace(/^﻿/, '').trim());
  return lines.slice(1).map(line => {
    const cells = splitRow(line); const obj = {};
    headers.forEach((h, i) => { obj[h] = (cells[i] || '').trim(); }); return obj;
  }).filter(r => r.title || r.url);
}
let allData = []; let currentFilter = 'all';
function render() {
  const feed = document.getElementById('feed'); feed.innerHTML = '';
  const keys = currentFilter === 'all' ? Object.keys(CATS) : [currentFilter];
  keys.forEach(key => {
    const cfg = CATS[key]; const items = allData.filter(d => d.category === key);
    if (items.length === 0) return;
    const sec = document.createElement('div'); sec.className = 'cat-section';
    sec.innerHTML = `<div class="cat-head"><div class="left"><h2 style="color:${cfg.accent}">${cfg.label}</h2><span class="en">${cfg.en}</span></div><span class="count">${items.length} articles</span></div><div class="cards" id="c-${key}"></div>`;
    feed.appendChild(sec);
    const grid = document.getElementById(`c-${key}`);
    items.forEach(item => {
      const a = document.createElement('a'); a.className = 'card'; a.href = item.url || '#'; a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.style.setProperty('--accent', cfg.accent); a.style.setProperty('--tint', cfg.tint);
      const thumbHtml = item.thumbnail ? `<img class="card-thumb" src="${esc(item.thumbnail)}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
      a.innerHTML = `${thumbHtml}<div class="card-body"><div class="src-row"><span class="src">${esc(item.source)}</span><span class="date">${esc(item.date)}</span></div><div class="title">${esc(item.title)}</div><div class="excerpt">${esc(item.excerpt)}</div><div class="arrow">READ MORE →</div></div>`;
      grid.appendChild(a);
    });
  });
  if (feed.children.length === 0) {
    feed.innerHTML = `<p style="padding:64px 0;text-align:center;color:var(--ink-faint);font-size:13px;">表示できる記事がありません。</p>`;
  }
  document.getElementById('total-count').textContent = `${allData.length} articles`;
  document.getElementById('stat-articles').textContent = allData.length;
}
document.querySelectorAll('#catnav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#catnav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); currentFilter = btn.dataset.cat; render();
  });
});
async function loadCSV() {
  try {
    const res = await fetch('life_curated_feed.csv');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text(); const rows = parseCSV(text);
    if (rows.length === 0) throw new Error('no data');
    allData = rows.map(r => ({
      source: r.source || '', title: r.title || '', url: r.url || '#', date: formatDate(r.date || ''), excerpt: r.excerpt || '', category: detectCategory(r.category || '', r.source || ''), thumbnail: r.thumbnail || ''
    }));
    const latestDate = rows.map(r => r.date).filter(Boolean).sort().reverse()[0];
    if (latestDate) {
      const m = latestDate.match(/\d{4}-(\d{2})-(\d{2})/);
      document.getElementById('updated-date').textContent = m ? `Updated ${m[1]}.${m[2]}` : `Updated ${latestDate.slice(5,10)}`;
    } else { document.getElementById('updated-date').textContent = 'Updated'; }
    render();
  } catch (err) {
    console.warn('[LIFE CURATED] CSV読み込みエラー:', err.message);
    document.getElementById('updated-date').textContent = 'CSV未読込';
    document.getElementById('feed').innerHTML = `<p style="padding:64px 28px;text-align:center;color:var(--ink-faint);font-size:13px;line-height:2;">life_curated_feed.csv の読み込みに失敗しました。</p>`;
  }
}
loadCSV();
</script>
</body>
</html>
